<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCiencias IA - Plataforma de Ciencias Naturales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    
    <script>
        // ==================== CONFIGURACIÓN ====================
        window.EDUCIENCIAS_CONFIG = {
            // URL de tu proyecto Supabase
            supabaseUrl: 'https://TU_PROYECTO.supabase.co',
            supabaseAnonKey: 'TU_ANON_KEY',
            
            // Token de HuggingFace para Inference API
            hfToken: 'TU_HF_TOKEN',
            hfModel: 'meta-llama/Llama-3.1-8B-Instruct'
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="app"></div>

    <script>
    // ============================================
    // UTILIDADES SUPABASE
    // ============================================
    const SB = {
        url: window.EDUCIENCIAS_CONFIG.supabaseUrl,
        key: window.EDUCIENCIAS_CONFIG.supabaseAnonKey,
        
        async request(endpoint, options = {}) {
            const headers = {
                'apikey': this.key,
                'Authorization': `Bearer ${localStorage.getItem('sb_token') || this.key}`,
                'Content-Type': 'application/json',
                'Prefer': options.prefer || 'return=representation'
            };
            
            const url = `${this.url}/rest/v1/${endpoint}`;
            let resp;
            
            if (options.method === 'POST') {
                resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(options.body) });
            } else if (options.method === 'PATCH') {
                resp = await fetch(url + `?${options.eq}`, { method: 'PATCH', headers, body: JSON.stringify(options.body) });
            } else if (options.method === 'DELETE') {
                resp = await fetch(url + `?${options.eq}`, { method: 'DELETE', headers });
            } else {
                resp = await fetch(url, { headers });
            }
            
            if (resp.status >= 400) {
                const err = await resp.text();
                console.error('SB Error:', err);
                return null;
            }
            
            const data = await resp.json();
            return Array.isArray(data) ? data : data;
        },
        
        async signUp(email, password, metadata = {}) {
            const resp = await fetch(`${this.url}/auth/v1/signup`, {
                method: 'POST',
                headers: { 'apikey': this.key, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, data: metadata })
            });
            return resp.json();
        },
        
        async signIn(email, password) {
            const resp = await fetch(`${this.url}/auth/v1/login?email=${email}&password=${password}`, {
                method: 'POST',
                headers: { 'apikey': this.key, 'Content-Type': 'application/json' }
            });
            return resp.json();
        },
        
        async signOut() {
            const token = localStorage.getItem('sb_token');
            await fetch(`${this.url}/auth/v1/logout`, {
                method: 'POST',
                headers: { 
                    'apikey': this.key, 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            localStorage.removeItem('sb_token');
            localStorage.removeItem('sb_user');
        },
        
        async getUser() {
            const token = localStorage.getItem('sb_token');
            if (!token) return null;
            const resp = await fetch(`${this.url}/auth/v1/user`, {
                headers: { 'apikey': this.key, 'Authorization': `Bearer ${token}` }
            });
            return resp.ok ? resp.json() : null;
        },
        
        async getPerfil(userId) {
            return this.request(`perfiles?id=eq.${userId}`);
        },
        
        async getDocente(userId) {
            const docs = await this.request(`docentes?user_id=eq.${userId}`);
            return docs ? docs[0] : null;
        },
        
        async getEstudiante(userId) {
            const ests = await this.request(`estudiantes?user_id=eq.${userId}`);
            return ests ? ests[0] : null;
        }
    };

    // ============================================
    // HUGGINGFACE (Solo Inference API)
    // ============================================
    const HF = {
        token: window.EDUCIENCIAS_CONFIG.hfToken,
        model: window.EDUCIENCIAS_CONFIG.hfModel,
        
        async generate(prompt, options = {}) {
            const maxTokens = options.maxTokens || 512;
            const temperature = options.temperature || 0.7;
            
            if (this.token && this.model) {
                try {
                    const resp = await fetch(`https://api-inference.huggingface.co/models/${this.model}`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: prompt,
                            parameters: {
                                max_new_tokens: maxTokens,
                                temperature: temperature,
                                return_full_text: false
                            }
                        })
                    });
                    
                    if (resp.ok) {
                        const data = await resp.json();
                        return Array.isArray(data) ? data[0]?.generated_text : data.generated_text;
                    }
                } catch (e) {
                    console.error('HF Error:', e);
                }
            }
            
            return "Lo siento, el servicio de IA no está disponible.";
        },
        
        async tutor(grado, pregunta) {
            const prompt = `Eres un tutor de ciencias naturales paciente y amigable para estudiantes de ${grado}. Responde en español de forma clara y didáctica.\n\nEstudiante: ${pregunta}\nTutor:`;
            return this.generate(prompt);
        },
        
        async validarHipotesis(hipotesis) {
            const prompt = `Eres un científico guía. Analiza la hipótesis:\n\nHIPÓTESIS: ${hipotesis}\n\nProporciona: 1. Análisis científico 2. Crítica 3. Sugerencias 4. Experimento simple\n\nRespuesta:`;
            return this.generate(prompt, { maxTokens: 1024 });
        },
        
        async generarQuiz(tema, grado) {
            const prompt = `Genera un quiz de ciencias sobre '${tema}' para ${grado}. Responde SOLO en JSON: {"titulo": "Quiz", "preguntas": [{"tipo": "seleccion", "pregunta": "...", "opciones": ["A","B"], "respuesta": "A", "explicacion": "..."}]}`;
            const result = await this.generate(prompt, { maxTokens: 1024 });
            try { return JSON.parse(result); } 
            catch { return { error: 'Error al generar' }; }
        },
        
        async generarSimulacion(desc) {
            const prompt = `Crea simulador HTML5 Canvas. Descripción: ${desc}. Responde JSON: {"html": "<html>", "explicacion": "..."}`;
            const result = await this.generate(prompt, { maxTokens: 2048 });
            try { return JSON.parse(result); }
            catch { return { html: result }; }
        },
        
        async generarProyecto(titulo, steam, tema) {
            const d = Object.entries(steam).filter(([k,v]) => v).map(([k]) => k).join(', ');
            const prompt = `Proyecto STEAM '${titulo}'. Disciplinas: ${d}. Tema: ${tema}. JSON: {"resumen": "...", "materiales": [], "fases": []}`;
            const result = await this.generate(prompt, { maxTokens: 1024 });
            try { return JSON.parse(result); }
            catch { return { error: 'Error' }; }
        },
        
        async buscarBiodiversidad(esp) {
            const prompt = `Info sobre '${esp}' en RD. JSON: {"nombre": "...", "nombre_cientifico": "...", "tipo": "planta", "descripcion": "..."}`;
            const result = await this.generate(prompt, { maxTokens: 512 });
            try { return JSON.parse(result); }
            catch { return { nombre: esp, descripcion: result }; }
        }
    };

    // ============================================
    // STATE
    // ============================================
    let state = { user: null, perfil: null, view: 'login', data: {}, loading: false };

    const TODOS_LOS_GRADOS = [
        '1ro de Primaria', '2do de Primaria', '3ro de Primaria', '4to de Primaria', '5to de Primaria', '6to de Primaria',
        '1ro de Secundaria', '2do de Secundaria', '3ro de Secundaria', '4to de Secundaria', '5to de Secundaria', '6to de Secundaria'
    ];

    const ESCUELAS = ['Politécnico Lilia Bayona', 'Politécnico Escuela Hogar del Niño', 'Politécnico Evangelico Shalom', 'Polécnico María Auxiliadora', 'Politécnico Max Simón', 'Politécnico Prof. Miguel Infante Santana', 'Politécnico Luis Heriberto Payán', 'Polécnico Prof. Mercedes María Lazala Mejía', 'Fundación MIR Campo Verde', 'Fundación MIR Esperanza', 'Politécnico San José de Calasanz', 'Colegio Saint Nicolas', 'Escuela Calasanz-San Pedro'];

    const FRASES = [
        { frase: "La educación es el arma más poderosa para cambiar el mundo.", autor: "Nelson Mandela" },
        { frase: "La curiosidad es la fuerza impulsora de la ciencia.", autor: "Albert Einstein" },
        { frase: "La ciencia es más que un cuerpo de conocimientos.", autor: "Carl Sagan" }
    ];

    // ============================================
    // LOGIN
    // ============================================
    function renderLogin() {
        return `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-400 to-blue-500 p-4">
            <div id="loginModalContent" class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                <div class="flex justify-center mb-6">
                    <div class="bg-green-100 p-4 rounded-full">
                        <i class="fas fa-flask text-green-600 text-3xl"></i>
                    </div>
                </div>
                <h1 class="text-3xl font-extrabold text-center text-slate-800 mb-2">EduCiencias IA</h1>
                <p class="text-center text-slate-500 mb-6">Plataforma de Ciencias Naturales</p>
                
                <div id="loginError" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 text-center"></div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                        <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-slate-200" placeholder="tu@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-slate-200" placeholder="Contraseña">
                    </div>
                    
                    <button onclick="handleLogin()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 mt-4">Ingresar</button>
                    
                    <div class="text-center mt-4">
                        <p class="text-sm text-slate-500">¿Eres maestro y no tienes cuenta?</p>
                        <button onclick="mostrarRegistroDocente()" class="text-blue-600 font-bold text-sm">Registrarse</button>
                    </div>
                </div>
            </div>
        </div>
        `;
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        const result = await SB.signIn(email, password);
        
        if (result.access_token) {
            localStorage.setItem('sb_token', result.access_token);
            const user = await SB.getUser();
            if (user) {
                const perfiles = await SB.getPerfil(user.id);
                const perfil = perfiles ? perfiles[0] : null;
                
                state.user = { id: user.id, email: user.email };
                state.perfil = perfil;
                
                if (perfil?.rol === 'docente') {
                    const docente = await SB.getDocente(user.id);
                    if (docente) {
                        state.user.rol = 'docente';
                        state.user.nombre = perfil.nombre;
                        state.user.docenteId = docente.id;
                        state.user.escuela = docente.escuela;
                        state.user.grados = JSON.parse(docente.grados || '[]');
                    }
                } else if (perfil?.rol === 'estudiante') {
                    const estudiante = await SB.getEstudiante(user.id);
                    if (estudiante) {
                        state.user.rol = 'estudiante';
                        state.user.nombre = perfil.nombre;
                        state.user.estudianteId = estudiante.id;
                        state.user.grado = estudiante.grado;
                    }
                } else if (perfil?.rol === 'admin') {
                    state.user.rol = 'admin';
                    state.user.nombre = perfil.nombre;
                }
                
                state.view = 'dashboard';
                localStorage.setItem('sb_user', JSON.stringify(state.user));
                render();
            }
        } else {
            errorDiv.textContent = result.error_description || 'Credenciales incorrectas';
            errorDiv.classList.remove('hidden');
        }
    }

    function mostrarRegistroDocente() {
        document.getElementById('loginModalContent').innerHTML = `
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black">Registro de Maestro</h2>
            </div>
            <div class="space-y-4">
                <div><label class="block text-sm font-bold mb-1">Nombre</label>
                <input type="text" id="regNombre" class="w-full px-4 py-3 rounded-xl border" placeholder="Tu nombre"></div>
                <div><label class="block text-sm font-bold mb-1">Email</label>
                <input type="email" id="regEmail" class="w-full px-4 py-3 rounded-xl border" placeholder="tu@email.com"></div>
                <div><label class="block text-sm font-bold mb-1">Contraseña</label>
                <input type="password" id="regPassword" class="w-full px-4 py-3 rounded-xl border" placeholder="Contraseña"></div>
                <div><label class="block text-sm font-bold mb-1">Escuela</label>
                <select id="regEscuela" class="w-full px-4 py-3 rounded-xl border">
                    <option value="">Selecciona</option>${ESCUELAS.map(e => `<option value="${e}">${e}</option>`).join('')}
                </select></div>
                <div><label class="block text-sm font-bold mb-1">Grados</label>
                <div class="grid grid-cols-2 gap-2 max-h-32 overflow-y-auto p-2 bg-slate-50 rounded-lg border">
                    ${TODOS_LOS_GRADOS.map(g => `<label class="flex items-center gap-2 text-xs"><input type="checkbox" value="${g}" class="reg-grado-checkbox"> ${g}</label>`).join('')}
                </div></div>
                <button onclick="handleRegistroDocente()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Registrarse</button>
                <button onclick="render()" class="w-full text-slate-500 text-sm py-2">Cancelar</button>
            </div>
        `;
    }

    async function handleRegistroDocente() {
        const nombre = document.getElementById('regNombre').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;
        const escuela = document.getElementById('regEscuela').value;
        const grados = Array.from(document.querySelectorAll('.reg-grado-checkbox:checked')).map(cb => cb.value);
        
        if (!nombre || !email || !password || !escuela || grados.length === 0) {
            return alert('Completa todos los campos');
        }
        
        const result = await SB.signUp(email, password, { rol: 'docente', nombre });
        
        if (result.id || result.access_token) {
            const userId = result.id || result.user_id;
            await SB.request('perfiles', { method: 'POST', body: { id: userId, email, rol: 'docente', nombre } });
            await SB.request('docentes', { method: 'POST', body: { user_id: userId, nombre, escuela, grados: JSON.stringify(grados), razon: '' } });
            alert('¡Registro exitoso!');
            render();
        } else {
            alert(result.error_description || 'Error al registrar');
        }
    }

    async function handleLogout() {
        await SB.signOut();
        state.user = null;
        localStorage.removeItem('sb_user');
        state.view = 'login';
        render();
    }

    // ============================================
    // SIDEBAR
    // ============================================
    function renderSidebar() {
        const menu = {
            admin: [{id:'dashboard',l:'Estadísticas',i:'fa-chart-bar'},{id:'sugerencias',l:'Sugerencias',i:'fa-envelope'},{id:'logs',l:'Logs',i:'fa-history'},{id:'config',l:'Config',i:'fa-cog'}],
            docente: [{id:'dashboard',l:'Panel',i:'fa-calendar'},{id:'estudiantes',l:'Estudiantes',i:'fa-users'},{id:'asignaciones',l:'Tareas',i:'fa-tasks'},{id:'evaluaciones',l:'Quizzes',i:'fa-question-circle'},{id:'proyectos',l:'STEAM',i:'fa-lightbulb'},{id:'simulador',l:'Simulador',i:'fa-robot'},{id:'foro',l:'Comunidad',i:'fa-comments'},{id:'biodiversidad',l:'Biodiversidad',i:'fa-leaf'},{id:'perfil',l:'Perfil',i:'fa-user'}],
            estudiante: [{id:'dashboard',l:'Mi Progreso',i:'fa-book'},{id:'tutor',l:'Tutor IA',i:'fa-comments'},{id:'metacognicion',l:'Diario',i:'fa-book-open'},{id:'hipotesis',l:'Hipótesis',i:'fa-flask'},{id:'biodiversidad',l:'Biodiversidad',i:'fa-leaf'}]
        };
        
        const items = menu[state.user?.rol] || [];
        return `
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-screen fixed left-0 top-0 overflow-y-auto">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-800 p-2 rounded-xl text-white"><i class="fas fa-flask"></i></div>
                    <span class="text-lg font-black">EduCiencias</span>
                </div>
            </div>
            <nav class="p-4 space-y-2">
                ${items.map(item => `
                    <button onclick="navigate('${item.id}')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm ${state.view === item.id ? 'bg-indigo-50 text-indigo-700 border border-indigo-100' : 'text-slate-500 hover:bg-slate-50'}">
                        <i class="fas ${item.i} ${state.view === item.id ? 'text-indigo-600' : 'text-slate-400'}"></i>${item.l}
                    </button>
                `).join('')}
            </nav>
            <div class="p-4 border-t border-slate-100 mt-auto">
                <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-bold text-sm">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </aside>
        `;
    }

    function navigate(view) { state.view = view; render(); }

    async function renderMain() {
        const content = await renderContent();
        return `
        <div class="ml-64 min-h-screen">
            <header class="bg-white p-6 border-b border-slate-200 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-black">¡Hola, ${state.user?.nombre || 'Usuario'}!</h2>
                    <p class="text-sm text-slate-500">${state.user?.rol === 'estudiante' ? state.user?.grado : state.user?.rol === 'docente' ? state.user?.escuela : 'Admin'}</p>
                </div>
                <div class="h-12 w-12 bg-slate-800 rounded-full flex items-center justify-center text-xl font-black text-white">${(state.user?.nombre || 'U').charAt(0)}</div>
            </header>
            <main class="p-8">${content}</main>
        </div>
        `;
    }

    async function renderContent() {
        const v = state.view;
        if (v === 'dashboard') return state.user?.rol === 'admin' ? await renderAdmin() : state.user?.rol === 'docente' ? await renderDocente() : await renderEstudiante();
        if (v === 'estudiantes') return await renderEstudiantes();
        if (v === 'asignaciones') return await renderAsignaciones();
        if (v === 'evaluaciones') return await renderEvaluaciones();
        if (v === 'proyectos') return await renderProyectos();
        if (v === 'simulador') return await renderSimulador();
        if (v === 'foro') return await renderForo();
        if (v === 'biodiversidad') return await renderBiodiversidad();
        if (v === 'perfil') return await renderPerfil();
        if (v === 'sugerencias') return await renderSugerencias();
        if (v === 'logs') return await renderLogs();
        if (v === 'config') return await renderConfig();
        if (v === 'tutor') return await renderTutor();
        if (v === 'metacognicion') return await renderMetacognicion();
        if (v === 'hipotesis') return await renderHipotesis();
        return '<div>En desarrollo...</div>';
    }

    function render() {
        const app = document.getElementById('app');
        if (!state.user && state.view !== 'login') state.view = 'login';
        if (state.view === 'login') { app.innerHTML = renderLogin(); return; }
        app.innerHTML = renderSidebar() + `<div class="fade-in">${renderMain()}</div>`;
    }

    // ============================================
    // VISTAS ESTUDIANTE
    // ============================================
    async function renderEstudiante() {
        const frase = FRASES[Math.floor(Math.random() * FRASES.length)];
        const asignaciones = await SB.request(`asignaciones?grado=eq.${state.user?.grado}&activa=eq.true`);
        const entregas = await SB.request(`entregas?estudiante_id=eq.${state.user?.estudianteId}`);
        const calif = entregas?.filter(e => e.calificacion) || [];
        const promedio = calif.length ? Math.round(calif.reduce((a,b) => a + b.calificacion, 0) / calif.length) : 0;
        
        return `
        <div class="space-y-6">
            <div class="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-3xl p-8 text-white">
                <h3 class="text-3xl font-black mb-1">¡Hola ${state.user?.nombre}!</h3>
                <p class="text-emerald-100">Estudiando en ${state.user?.grado}</p>
                <div class="mt-4 bg-white/20 rounded-xl p-4">
                    <p class="text-lg italic">"${frase.frase}"</p>
                    <p class="text-sm text-right">- ${frase.autor}</p>
                </div>
                <button onclick="navigate('tutor')" class="mt-4 bg-white text-emerald-600 font-bold px-6 py-3 rounded-xl">Comenzar a aprender</button>
            </div>
            
            <div class="bg-white rounded-2xl p-6 border border-slate-200">
                <h4 class="text-xl font-bold mb-4">Mi Progreso: ${promedio}%</h4>
                <div class="w-full bg-slate-200 rounded-full h-3 mb-4"><div class="bg-emerald-500 h-3 rounded-full" style="width: ${promedio}%"></div></div>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="bg-amber-50 rounded-xl p-4"><div class="text-2xl font-black text-amber-600">${entregas?.length||0}</div><div class="text-xs">Entregas</div></div>
                    <div class="bg-purple-50 rounded-xl p-4"><div class="text-2xl font-black text-purple-600">${asignaciones?.length||0}</div><div class="text-xs">Tareas</div></div>
                    <div class="bg-blue-50 rounded-xl p-4"><div class="text-2xl font-black text-blue-600">${calif.length}</div><div class="text-xs">Calificadas</div></div>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-6 border border-slate-200">
                <h4 class="text-xl font-bold mb-4">Mis Tareas</h4>
                ${asignaciones?.length ? asignaciones.map(a => `
                    <div class="p-4 bg-slate-50 rounded-xl mb-2 flex justify-between items-center">
                        <div><div class="font-bold">${a.titulo} ${a.tipo==='laboratorio'?'<span class="text-xs px-2 py-1 rounded bg-emerald-100">🧪</span>':''}</div><div class="text-sm text-slate-500">${a.descripcion||''}</div></div>
                        ${a.tipo==='laboratorio'?`<button onclick="abrirLab('${a.id}','${a.titulo}')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm">🧪</button>`:`<button onclick="entregar('${a.id}','${a.titulo}')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">Entregar</button>`}
                    </div>

    async function renderSugerencias() {
        const s = await SB.request('sugerencias?order=fecha.desc');
        return `<div class="bg-white rounded-2xl p-6 border"><h3 class="text-xl font-bold mb-4">Sugerencias</h3>${s?.length?s.map(x=>`<div class="p-4 bg-slate-50 rounded-xl mb-3"><div class="flex justify-between"><span class="font-bold">${x.maestro_id}</span><span class="text-xs text-slate-400">${x.fecha}</span></div><p class="text-slate-700 mt-2">${x.texto}</p>${x.respuesta?`<p class="text-green-600 mt-2">✓ ${x.respuesta}</p>`:`<div class="mt-2 flex gap-2"><input type="text" id="rs-${x.id}" placeholder="Responder..." class="flex-1 p-2 rounded border text-sm"><button onclick="respSug('${x.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm">Responder</button></div>`}</div>`).join(''):'<p class="text-slate-500">Sin sugerencias</p>'}</div>`;
    }

    async function respSug(id) {
        await SB.request('sugerencias', { method: 'PATCH', eq: `id=eq.${id}`, body: { respuesta: document.getElementById(`rs-${id}`).value, procesada: true } });
        render();
    }

    async function renderLogs() {
        const l = await SB.request('logs?order=fecha.desc&limit=100');
        return `<div class="bg-white rounded-2xl p-6 border"><h3 class="text-xl font-bold mb-4">Logs</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-slate-50"><th class="p-2 text-left">Fecha</th><th class="p-2 text-left">Rol</th><th class="p-2 text-left">Usuario</th><th class="p-2 text-left">Acción</th></tr></thead><tbody>${l?.length?l.map(x=>`<tr class="border-b"><td class="p-2">${x.fecha}</td><td class="p-2"><span class="bg-slate-100 px-2 py-1 rounded text-xs">${x.rol}</span></td><td class="p-2">${x.usuario}</td><td class="p-2">${x.accion}</td></tr>`).join(''):'<tr><td colspan="4" class="p-4 text-center">Sin logs</td></tr>'}</tbody></table></div></div>`;
    }

    async function renderConfig() {
        const s = await SB.request('settings');
        const c = {}; s?.forEach(x => c[x.clave] = x.valor);
        return `<div class="bg-white rounded-2xl p-6 border max-w-2xl"><h3 class="text-xl font-bold mb-4">Configuración</h3><div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl"><div><div class="font-bold">Modo Mantenimiento</div></div><button onclick="toggleMan('${c.maintenance_mode}')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">${c.maintenance_mode==='true'?'Desactivar':'Activar'}</button></div></div>`;
    }

    async function toggleMan(actual) {
        const nuevo = actual === 'true' ? 'false' : 'true';
        await SB.request('settings', { method: 'PATCH', eq: 'clave=eq.maintenance_mode', body: { valor: nuevo } });
        render();
    }

    // ============================================
    // INIT
    // ============================================
    async function init() {
        const saved = localStorage.getItem('sb_user');
        const token = localStorage.getItem('sb_token');
        if (saved && token) {
            state.user = JSON.parse(saved);
            const u = await SB.getUser();
            if (u) { state.view = 'dashboard'; }
            else { localStorage.removeItem('sb_token'); localStorage.removeItem('sb_user'); }
        }
        render();
    }

    init();
    </script>
</body>
</html>
