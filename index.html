<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCiencias IA - Plataforma de Ciencias Naturales</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-section { opacity: 0; transform: translateY(50px); transition: all 0.8s ease-out; }
        .scroll-section.visible { opacity: 1; transform: translateY(0); }
        .gradient-text { background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        html { scroll-behavior: smooth; }
    </style>
    
    <script>
        window.EDUCIENCIAS_CONFIG = {
            d1ApiUrl: 'https://educiencias.edwinjeremiasagustinyack.workers.dev',
            d1ApiKey: 'dev-token',
            hfToken: '',
            hfModel: 'meta-llama/Llama-3.1-8B-Instruct'
        };
    </script>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
    // ============================================
    // ROUTER
    // ============================================
    const ROUTES = {
        '': 'landing',
        '#landing': 'landing',
        '#registro': 'registro',
        '#login': 'login',
        '#dashboard': 'dashboard'
    };

    function router() {
        const hash = window.location.hash || '#landing';
        return ROUTES[hash] || 'landing';
    }

    // ============================================
    // API CLIENT
    // ============================================
    const API = {
        url: window.EDUCIENCIAS_CONFIG.d1ApiUrl,
        key: window.EDUCIENCIAS_CONFIG.d1ApiKey,
        
        async request(endpoint, options = {}) {
            const headers = { 'Authorization': `Bearer ${this.key}`, 'Content-Type': 'application/json' };
            const url = `${this.url}${endpoint}`;
            let resp;
            
            if (options.method === 'POST') resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(options.body) });
            else if (options.method === 'PATCH') resp = await fetch(url + '/' + options.id, { method: 'PATCH', headers, body: JSON.stringify(options.body) });
            else if (options.method === 'DELETE') resp = await fetch(url + '/' + options.id, { method: 'DELETE', headers });
            else resp = await fetch(url, { headers });
            
            if (!resp.ok) { console.error('API Error:', await resp.text()); return options.isArray !== false ? [] : null; }
            return await resp.json();
        },
        
        async get(table) { return this.request(`/${table}`); },
        async getBy(table, filter) { return this.request(`/${table}?${filter}`); },
        async post(table, data) { return this.request(`/${table}`, { method: 'POST', body: data }); },
        async patch(table, id, data) { return this.request(`/${table}`, { method: 'PATCH', id, body: data }); },
        async delete(table, id) { return this.request(`/${table}`, { method: 'DELETE', id }); }
    };

    // ============================================
    // AUTH
    // ============================================
    const AUTH = {
        async login(email, password) {
            const result = await API.request('/auth/login', { method: 'POST', body: { email, password } });
            return result?.user || null;
        },
        
        async register(email, password, nombre, rol, extras = {}) {
            const result = await API.request('/auth/register', { method: 'POST', body: { email, password, nombre, rol, ...extras } });
            return result?.user;
        },
        
        save(user) { localStorage.setItem('edu_user', JSON.stringify(user)); },
        get() { const s = localStorage.getItem('edu_user'); return s ? JSON.parse(s) : null; },
        clear() { localStorage.removeItem('edu_user'); }
    };

    // ============================================
    // STATE
    // ============================================
    let state = { user: null, view: 'landing', data: {} };

    const TODOS_LOS_GRADOS = ['1ro de Primaria','2do de Primaria','3ro de Primaria','4to de Primaria','5to de Primaria','6to de Primaria','1ro de Secundaria','2do de Secundaria','3ro de Secundaria','4to de Secundaria','5to de Secundaria','6to de Secundaria'];
    const ESCUELAS = ['Politécnico Lilia Bayona','Politécnico Escuela Hogar del Niño','Politécnico Evangelico Shalom','Polécnico María Auxiliadora','Politécnico Max Simón','Politécnico Prof. Miguel Infante Santana','Politécnico Luis Heriberto Payán','Polécnico Prof. Mercedes María Lazala Mejía','Fundación MIR Campo Verde','Fundación MIR Esperanza','Politécnico San José de Calasanz','Colegio Saint Nicolas','Escuela Calasanz-San Pedro'];
    const FRASES = [{f:"La educación es el arma más poderosa para cambiar el mundo.",a:"Nelson Mandela"},{f:"La curiosidad es la fuerza impulsora de la ciencia.",a:"Albert Einstein"},{f:"La ciencia es más que un cuerpo de conocimientos.",a:"Carl Sagan"}];

    // ============================================
    // SCROLL INTELLIGENCE
    // ============================================
    function initScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        
        document.querySelectorAll('.scroll-section').forEach(el => observer.observe(el));
    }

    // ============================================
    // LANDING PAGE
    // ============================================
    function renderLanding() {
        return `
        <div class="min-h-screen">
            <!-- Navbar -->
            <nav class="fixed w-full bg-white/90 backdrop-blur-md z-50 border-b">
                <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-flask text-green-600 text-2xl"></i>
                        <span class="text-xl font-black">EduCiencias</span>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="location.hash='#login'" class="px-4 py-2 font-bold text-slate-600 hover:text-slate-800">Iniciar Sesión</button>
                        <button onclick="location.hash='#registro'" class="px-4 py-2 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700">Registrarse</button>
                    </div>
                </div>
            </nav>

            <!-- Hero -->
            <section class="pt-32 pb-20 px-4 bg-gradient-to-br from-green-400 via-blue-500 to-indigo-600">
                <div class="max-w-4xl mx-auto text-center text-white">
                    <h1 class="text-5xl md:text-7xl font-black mb-6 fade-in">EduCiencias IA</h1>
                    <p class="text-xl md:text-2xl mb-8 opacity-90 fade-in">Plataforma inteligente de ciencias naturales con tutor de IA</p>
                    <button onclick="location.hash='#registro'" class="px-8 py-4 bg-white text-green-600 font-bold text-xl rounded-full hover:scale-105 transition-transform fade-in">¡Comienza Ahora!</button>
                </div>
            </section>

            <!-- Características -->
            <section class="py-20 px-4 scroll-section">
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-4xl font-black text-center mb-12 gradient-text">¿Por qué usar EduCiencias?</h2>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="bg-white p-8 rounded-3xl shadow-lg text-center">
                            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-robot text-green-600 text-2xl"></i></div>
                            <h3 class="text-xl font-bold mb-2">Tutor IA</h3>
                            <p class="text-slate-600">Aprende con un tutor inteligente que te ayuda en tiempo real</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-lg text-center">
                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-flask text-blue-600 text-2xl"></i></div>
                            <h3 class="text-xl font-bold mb-2">Laboratorio Virtual</h3>
                            <p class="text-slate-600">Experimenta con hipótesis científicas de forma segura</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-lg text-center">
                            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-lightbulb text-purple-600 text-2xl"></i></div>
                            <h3 class="text-xl font-bold mb-2">Proyectos STEAM</h3>
                            <p class="text-slate-600">Crea proyectos interdisciplinarios con ayuda de IA</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Funcionalidades -->
            <section class="py-20 px-4 bg-slate-100 scroll-section">
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-4xl font-black text-center mb-12">Todo lo que necesitas</h2>
                    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-users text-green-600 text-xl mb-2"></i><h4 class="font-bold">Gestión de Estudiantes</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-tasks text-blue-600 text-xl mb-2"></i><h4 class="font-bold">Tareas y Laboratorios</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-question-circle text-orange-600 text-xl mb-2"></i><h4 class="font-bold">Quizzes con IA</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-leaf text-green-600 text-xl mb-2"></i><h4 class="font-bold">Biodiversidad RD</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-comments text-indigo-600 text-xl mb-2"></i><h4 class="font-bold">Foro Docente</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-chart-bar text-purple-600 text-xl mb-2"></i><h4 class="font-bold">Estadísticas</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-book-open text-teal-600 text-xl mb-2"></i><h4 class="font-bold">Diario Científico</h4></div>
                        <div class="bg-white p-6 rounded-2xl shadow"><i class="fas fa-robot text-slate-600 text-xl mb-2"></i><h4 class="font-bold">Simuladores IA</h4></div>
                    </div>
                </div>
            </section>

            <!-- CTA -->
            <section class="py-20 px-4 bg-gradient-to-r from-green-500 to-blue-600 scroll-section">
                <div class="max-w-3xl mx-auto text-center text-white">
                    <h2 class="text-4xl font-black mb-4">¡Únete a la revolución educativa!</h2>
                    <p class="text-xl mb-8">Miles de estudiantes y docentes ya están usando EduCiencias</p>
                    <button onclick="location.hash='#registro'" class="px-8 py-4 bg-white text-green-600 font-bold text-xl rounded-full">Crear Cuenta Gratis</button>
                </div>
            </section>

            <!-- Footer -->
            <footer class="bg-slate-900 text-white py-12 px-4">
                <div class="max-w-6xl mx-auto text-center">
                    <div class="flex justify-center gap-2 mb-4"><i class="fas fa-flask text-green-400 text-2xl"></i><span class="text-xl font-bold">EduCiencias IA</span></div>
                    <p class="text-slate-400">© 2026 EduCiencias. Plataforma de Ciencias Naturales.</p>
                </div>
            </footer>
        </div>`;
    }

    // ============================================
    // REGISTRO PAGE
    // ============================================
    function renderRegistro() {
        return `
        <div class="min-h-screen bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full">
                <div class="text-center mb-6">
                    <button onclick="location.hash='#landing'" class="text-green-600 font-bold mb-4"><i class="fas fa-arrow-left"></i> Volver</button>
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-chalkboard-teacher text-green-600 text-2xl"></i></div>
                    <h1 class="text-3xl font-black">Registro de Docente</h1>
                    <p class="text-slate-500">¡Únete a la comunidad EduCiencias!</p>
                </div>
                
                <div id="re-mensaje" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 text-center"></div>
                
                <form onsubmit="event.preventDefault(); registrarDocente();" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Nombre Completo</label>
                        <input type="text" id="rn" required class="w-full px-4 py-3 rounded-xl border" placeholder="Tu nombre">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Email</label>
                        <input type="email" id="re" required class="w-full px-4 py-3 rounded-xl border" placeholder="tu@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Contraseña</label>
                        <input type="password" id="rpw" required class="w-full px-4 py-3 rounded-xl border" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Escuela</label>
                        <select id="resc" required class="w-full px-4 py-3 rounded-xl border">
                            <option value="">Selecciona tu escuela</option>
                            ${ESCUELAS.map(e=>`<option value="${e}">${e}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Grados en los que imparte</label>
                        <div class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 bg-slate-50 rounded-lg border">
                            ${TODOS_LOS_GRADOS.map(g=>`<label class="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" value="${g}" class="rgc"> ${g}</label>`).join('')}
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">¿Por qué usas esta página?</label>
                        <textarea id="rrazon" rows="2" class="w-full px-4 py-3 rounded-xl border" placeholder="Tu motivación..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700">Crear Cuenta</button>
                </form>
                
                <p class="text-center mt-4 text-slate-500">¿Ya tienes cuenta? <button onclick="location.hash='#login'" class="text-green-600 font-bold">Iniciar Sesión</button></p>
            </div>
        </div>`;
    }

    async function registrarDocente() {
        const n = document.getElementById('rn').value;
        const e = document.getElementById('re').value;
        const pw = document.getElementById('rpw').value;
        const esc = document.getElementById('resc').value;
        const gs = Array.from(document.querySelectorAll('.rgc:checked')).map(c=>c.value);
        const raz = document.getElementById('rrazon').value;
        
        if (!n || !e || !pw || !esc || !gs.length) {
            document.getElementById('re-mensaje').textContent = 'Completa todos los campos';
            document.getElementById('re-mensaje').classList.remove('hidden');
            return;
        }
        
        const r = await AUTH.register(e, pw, n, 'docente', {escuela: esc, grados: gs, razon: raz});
        if (r) {
            alert('¡Registro exitoso! Ahora puedes iniciar sesión.');
            location.hash = '#login';
        } else {
            document.getElementById('re-mensaje').textContent = 'Error al registrar';
            document.getElementById('re-mensaje').classList.remove('hidden');
        }
    }

    // ============================================
    // LOGIN PAGE
    // ============================================
    function renderLogin() {
        return `
        <div class="min-h-screen bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
                <div class="text-center mb-6">
                    <button onclick="location.hash='#landing'" class="text-green-600 font-bold mb-4"><i class="fas fa-arrow-left"></i> Volver</button>
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-flask text-green-600 text-2xl"></i></div>
                    <h1 class="text-3xl font-black">EduCiencias</h1>
                    <p class="text-slate-500">Inicia sesión en la plataforma</p>
                </div>
                
                <div id="le-mensaje" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 text-center"></div>
                
                <form onsubmit="event.preventDefault(); login();" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Email</label>
                        <input type="email" id="lem" required class="w-full px-4 py-3 rounded-xl border" placeholder="tu@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Contraseña</label>
                        <input type="password" id="lpw" required class="w-full px-4 py-3 rounded-xl border" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700">Ingresar</button>
                </form>
                
                <p class="text-center mt-4 text-slate-500">¿Nuevo docente? <button onclick="location.hash='#registro'" class="text-green-600 font-bold">Registrarse</button></p>
            </div>
        </div>`;
    }

    async function login() {
        const u = document.getElementById('lem').value;
        const p = document.getElementById('lpw').value;
        const user = await AUTH.login(u, p);
        
        if (user) {
            state.user = user;
            AUTH.save(user);
            location.hash = '#dashboard';
        } else {
            document.getElementById('le-mensaje').textContent = 'Credenciales incorrectas';
            document.getElementById('le-mensaje').classList.remove('hidden');
        }
    }

    // ============================================
    // DASHBOARD (Basic for now)
    // ============================================
    function renderDashboard() {
        const f = FRASES[Math.floor(Math.random()*FRASES.length)];
        return `
        <div class="min-h-screen bg-slate-50">
            <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2"><i class="fas fa-flask text-green-600"></i><span class="font-black">EduCiencias</span></div>
                <div class="flex items-center gap-4">
                    <span class="font-bold">${state.user?.nombre}</span>
                    <button onclick="logout()" class="text-red-500 font-bold">Salir</button>
                </div>
            </nav>
            <div class="p-8">
                <div class="bg-gradient-to-r from-green-500 to-blue-600 rounded-3xl p-8 text-white mb-8">
                    <h2 class="text-3xl font-black">¡Bienvenido, ${state.user?.nombre}!</h2>
                    <p class="opacity-90">${state.user?.escuela}</p>
                    <div class="mt-4 bg-white/20 rounded-xl p-4"><p class="italic">"${f.f}"</p><p class="text-sm text-right">- ${f.a}</p></div>
                </div>
                <div class="bg-white rounded-2xl p-6 border">
                    <h3 class="text-xl font-bold mb-4">Panel de ${state.user?.rol}</h3>
                    <p class="text-slate-500">Más funcionalidades coming soon...</p>
                </div>
            </div>
        </div>`;
    }

    function logout() {
        AUTH.clear();
        state.user = null;
        location.hash = '#landing';
    }

    // ============================================
    // MAIN RENDER
    // ============================================
    function render() {
        const app = document.getElementById('app');
        const view = router();
        
        if (view === 'landing') app.innerHTML = renderLanding();
        else if (view === 'registro') app.innerHTML = renderRegistro();
        else if (view === 'login') app.innerHTML = renderLogin();
        else if (view === 'dashboard') app.innerHTML = renderDashboard();
        
        initScrollObserver();
    }

    // ============================================
    // INIT
    // ============================================
    window.addEventListener('hashchange', render);
    
    const saved = AUTH.get();
    if (saved) {
        state.user = saved;
        location.hash = '#dashboard';
    }
    
    render();
    </script>
</body>
</html>
